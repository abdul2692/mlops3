services:
  - type: web
    name: sys-failure-prediction-api
    env: docker
    dockerfilePath: ./Dockerfile
    repo: https://github.com/YOUR_USERNAME/mlops-project # Replace with your GitHub repo
    disk:
      name: models-data
      mountPath: /app/models
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
    healthCheckPath: /health
    autoDeploy: true

